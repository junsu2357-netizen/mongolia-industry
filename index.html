<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mongolia Air Project</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-color: #2a9d8f;
            --text-color: #333;
            --accent-color: #e76f51;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 320px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 12px;
            text-decoration: none;
            color: #555;
            background: #f1f3f5;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        /* 강조하고 싶은 버튼 (예: 영어 버전이나 품질 데이터) */
        .btn-accent:hover {
            background: var(--accent-color);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mongolia Air Dashboard</h2>
    
    <div class="button-group">
        <a href="mongolia_air_market.html" class="btn">📊 Market Analysis (KR)</a>
        
        <a href="mongolia_air_market_en.html" class="btn">🌎 Market Analysis (EN)</a>
        
        <a href="mongolia_air_quality.html" class="btn btn-accent">🌬️ Air Quality Data</a>
    </div>

    <div class="footer">
        © 2026 Mongolia Project Dashboard
    </div>
</div>

</body>
</html>
